---
title: 1. Single file
layout: default
---
<input id="photo" type="file">
<div id="results"></div>

<script type="module">
  import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

  async function classify(file) {
    results.innerHTML = `<p>Classifying...</p>`;
    try {
      const client = await Client.connect("madihafarhana25/bear-classification");
      const result = await client.predict("/classify_bear", { img: file });
      console.log("Result:", result.data);

      const confidences = result.data[0].confidences;
      const top = confidences.sort((a, b) => b.confidence - a.confidence)[0];
      results.innerHTML = `
        <br/><img src="${URL.createObjectURL(file)}" width="300">
        <p><strong>${top.label}</strong> (${(top.confidence * 100).toFixed(1)}%)</p>
      `;
    } catch(error) {
      results.innerHTML = `<p>Error: ${error.message}</p>`;
      console.error(error);
    }
  }

  photo.addEventListener('change', () => {
    if (photo.files[0]) classify(photo.files[0]);
  });
</script>
